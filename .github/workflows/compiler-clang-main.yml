name: Building new Clang

on:
  push:
    branches:
      - clang/main-b
  # schedule:
  #   - cron: '15 0 * * *'

env:
  GITLAB_NAME: ${{ secrets.GITLAB_NAME }}
  GITLAB_SECRET: ${{ secrets.GITLAB_SECRET }}
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  GIT_SECRET: ${{ secrets.GIT_SECRET }}

jobs:
  Selupuh:

    runs-on: ubuntu-20.04

    container:
      image: zycromerz/tcdocker:v1

    steps:
    - name: checkout
      uses: actions/checkout@v2
      with:
        path: clang-10

    - name: Build TC 10
      run: |
        cd clang-10
        export DEBIAN_FRONTEND=noninteractive
        export PATH=/usr/bin/core_perl:$PATH
        bash ci.sh deps
        bash update-clang-version.sh 11
        bash clang-builder.sh 10 gi

